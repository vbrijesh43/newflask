<!DOCTYPE html>
<html>
<head>

<title>Welcome</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding-top:100px;
}

h1{
color:#333;
}

input{
padding:10px;
margin:10px;
width:200px;
}

button{
padding:10px 20px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

</style>

</head>

<body>

<h1>Login Successful</h1>

<h2>Welcome {{ username }}</h2>

<form method="POST">

<input type="number" name="number" placeholder="Enter number for square root" required>

<button type="submit">Calculate Square Root</button>

</form>

{% if result is not none %}
<h3>Square Root: {{ result }}</h3>
{% endif %}

</body>
</html>
