<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>

<style>

body{
margin:0;
padding:0;
font-family: Arial;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

background-image:url("https://images.unsplash.com/photo-1508780709619-79562169bc64");
background-size:cover;
background-position:center;
}

.login-box{
background:rgba(255,255,255,0.9);
padding:40px;
width:300px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#007BFF;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

</style>

</head>

<body>

<div class="login-box">

<h2 style="font-size: large;">Login</h2>

<form method="POST">

<input type="text" name="username" placeholder="Enter Username" required>

<input type="password" name="password" placeholder="Enter Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
